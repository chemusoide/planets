services:
  backend:
    build:
      context: ./backend
    container_name: planets-backend
    restart: unless-stopped
    environment:
      DATA_DIR: /code/data
    expose:
      - "8000"
    volumes:
      - planets-data:/code/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5


  frontend:
    build:
      context: ./frontend
    container_name: planets-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  planets-data:
